services:
  mysql:
    image: mysql:8.4
    container_name: rlvb-mysql
    restart: unless-stopped
    command: ["--max_allowed_packet=64M"]
    environment:
      MYSQL_DATABASE: ${DB_NAME:-rlvb_db}
      MYSQL_USER: ${DB_USER:-nabil1}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Nabilkarim1}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} -e 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rlvb-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8096}:${SERVER_PORT:-8096}"
    environment:
      APP_DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-rlvb_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      APP_DB_USERNAME: ${APP_DB_USERNAME:-${DB_USER:-nabil1}}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-${DB_PASSWORD:-Nabilkarim1}}
      EXTERNAL_COMPTES_JDBC_URL: ${EXTERNAL_COMPTES_JDBC_URL:-jdbc:mysql://mysql:3306/${DB_NAME:-rlvb_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      EXTERNAL_COMPTES_USERNAME: ${EXTERNAL_COMPTES_USERNAME:-${DB_USER:-nabil1}}
      EXTERNAL_COMPTES_PASSWORD: ${EXTERNAL_COMPTES_PASSWORD:-${DB_PASSWORD:-Nabilkarim1}}
      SERVER_PORT: ${SERVER_PORT:-8096}
      TESSERACT_PATH: ${TESSERACT_PATH:-/usr/bin/tesseract}
      TESSERACT_DATAPATH: ${TESSERACT_DATAPATH:-/usr/share/tesseract-ocr/5/tessdata}
      TESSERACT_LANGUAGE: ${TESSERACT_LANGUAGE:-eng+fra}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3022}
      SHOW_SQL: ${SHOW_SQL:-false}
      SEED_SUPERADMIN_ENABLED: ${SEED_SUPERADMIN_ENABLED:-true}
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL:-superadmin@invoice.local}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-Admin@123}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    profiles: ["frontend"]
    build:
      context: ${FRONTEND_CONTEXT:-../front-rlv_b}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8096}
    container_name: rlvb-frontend
    ports:
      - "${FRONTEND_PORT:-3023}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8096}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data_v2:
    driver: local
