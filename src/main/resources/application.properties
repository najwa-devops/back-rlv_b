spring.application.name=banking-ocr
spring.config.import=optional:file:.env[.properties]

# DATABASE CONFIGURATION
spring.datasource.url=${APP_DB_URL:jdbc:mariadb://localhost:3306/rlvb_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


# JPA / HIBERNATE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
# Keep dialect auto-detection and force enum columns to VARCHAR for
# compatibility with older MySQL/MariaDB servers.
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# FILE UPLOAD CONFIGURATION
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
banking.storage.mode=DB_ONLY

# TESSERACT CONFIGURATION
tesseract.path=${TESSERACT_PATH:/usr/bin/tesseract}
tesseract.datapath=${TESSERACT_DATAPATH:}
tesseract.language=${TESSERACT_LANGUAGE:eng+fra}

# SERVER CONFIGURATION
server.port=${SERVER_PORT:8096}

# LOGGING
logging.level.root=WARN
logging.level.com.invoice_reader=DEBUG
logging.level.org.springframework.context=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=DEBUG
logging.level.nu.pattern=OFF

# ACTUATOR
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

# CORS CONFIGURATION
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3022}

# SECURITY SEED (SUPER_ADMIN)
security.seed.superadmin.enabled=${SEED_SUPERADMIN_ENABLED:true}
security.seed.superadmin.email=${SEED_SUPERADMIN_EMAIL:superadmin@invoice.local}
security.seed.superadmin.password=${SEED_SUPERADMIN_PASSWORD:Admin@123}

# JWT AUTH
security.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
